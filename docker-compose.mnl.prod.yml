services:
  mongodb:
    image: mongo:7
    ports:
      - '127.0.0.1:27017:27017'
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qudrugforge}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD before starting the production stack}
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER before starting the production stack}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD before starting the production stack}
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  q-ai-drug:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD before starting the production stack}@postgres:5432/${POSTGRES_DB:-qudrugforge}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-qai-artifacts-production}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER before starting the production stack}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD before starting the production stack}
      S3_REGION: ${S3_REGION:-us-east-1}
      JWT_SECRET: ${QAI_JWT_SECRET:?Set QAI_JWT_SECRET before starting the production stack}
      ALLOWED_ORIGINS: ${QAI_ALLOWED_ORIGINS:?Set QAI_ALLOWED_ORIGINS before starting the production stack}
      QAI_USE_QUEUE: "1"
      QAI_RUN_MIGRATIONS: "1"
      QAI_OUTPUT_DIR: /app/outputs/cancer_proof_v1
      QAI_MODELS_DIR: /app/models
      QAI_MONGO_ENABLED: "1"
      QAI_MONGO_REQUIRED: "1"
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: ${QAI_MONGODB_DATABASE:-qai_drug_prod}
    ports:
      - '8000:8000'
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data:ro
      - ./models:/app/models:ro
    restart: unless-stopped

  backend:
    build:
      context: ./backend-mnl/qudrugforge-backend
      dockerfile: Dockerfile
    env_file:
      - ./backend-mnl/qudrugforge-backend/.env.production
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: ${MONGODB_DATABASE:-qudrugforge_prod}
      POSTGRES_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD before starting the production stack}@postgres:5432/${POSTGRES_DB:-qudrugforge}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY before starting the production stack}
      FRONTEND_URL: ${FRONTEND_URL:?Set FRONTEND_URL before starting the production stack}
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS before starting the production stack}
      Q_AI_DRUG_BASE_URL: http://q-ai-drug:8000
      Q_AI_DRUG_OUTPUT_ROOT: /app/q-ai-drug-outputs
      Q_AI_DRUG_EXECUTION_MODE: http
      ENABLE_DEV_JOB_SIMULATION: "false"
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      RAZORPAY_API_URL: ${RAZORPAY_API_URL:-https://api.razorpay.com/v1}
    ports:
      - '8001:8001'
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      q-ai-drug:
        condition: service_started
    volumes:
      - ./backend-mnl/qudrugforge-backend/storage:/app/storage
      - ./outputs:/app/q-ai-drug-outputs:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-mnl
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL before starting the production stack}
        NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-false}
        NEXT_PUBLIC_API_TIMEOUT_MS: ${NEXT_PUBLIC_API_TIMEOUT_MS:-10000}
    env_file:
      - ./frontend-mnl/.env.production
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL before starting the production stack}
      NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-false}
      NEXT_PUBLIC_API_TIMEOUT_MS: ${NEXT_PUBLIC_API_TIMEOUT_MS:-10000}
    ports:
      - '3001:3001'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
  postgres_data:
  minio_data:
